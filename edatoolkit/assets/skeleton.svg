<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes connDraw {
      from { stroke-dashoffset: 40; opacity: 0; }
      to   { stroke-dashoffset: 0;  opacity: 1; }
    }
    @media (prefers-reduced-motion: no-preference) {
      .cls-box { animation: fadeSlideIn 0.4s ease both; }
      .cls-conn { animation: connDraw 0.35s ease both; }
    }
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1a1a1a; }
    .th  { font-size: 13px; font-weight: 600; }
    .ts  { font-size: 11px; font-weight: 400; fill: #555; }

    .cls-box-1  { animation-delay: 0.05s; }
    .cls-box-2  { animation-delay: 0.15s; }
    .cls-box-3  { animation-delay: 0.25s; }
    .cls-box-4  { animation-delay: 0.35s; }
    .cls-box-5  { animation-delay: 0.45s; }
    .cls-box-6  { animation-delay: 0.55s; }
    .cls-box-7  { animation-delay: 0.65s; }
    .cls-box-8  { animation-delay: 0.75s; }
    .cls-box-9  { animation-delay: 0.85s; }
    .cls-box-10 { animation-delay: 0.95s; }
    .cls-conn-1 { animation-delay: 0.18s; stroke-dasharray: 40; }
    .cls-conn-2 { animation-delay: 0.28s; stroke-dasharray: 40; }
    .cls-conn-3 { animation-delay: 0.38s; stroke-dasharray: 40; }
    .cls-conn-4 { animation-delay: 0.48s; stroke-dasharray: 40; }
    .cls-conn-5 { animation-delay: 0.58s; stroke-dasharray: 40; }
    .cls-conn-6 { animation-delay: 0.68s; stroke-dasharray: 40; }
    .cls-conn-7 { animation-delay: 0.78s; stroke-dasharray: 40; }
    .cls-conn-8 { animation-delay: 0.88s; stroke-dasharray: 40; }
    .cls-conn-9 { animation-delay: 0.98s; stroke-dasharray: 40; }
  </style>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- background -->
<rect width="680" height="620" fill="#ffffff" rx="12"/>

<!-- ── EDA class (top centre) ── -->
<g class="cls-box cls-box-1">
  <rect x="214" y="20" width="252" height="68" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central" fill="#26215C">EDA</text>
  <text class="ts" x="340" y="70" text-anchor="middle" dominant-baseline="central" fill="#534AB7">dataframe · target_col · cat_th · car_th · alpha</text>
</g>

<!-- ── State attributes row ── -->
<g class="cls-box cls-box-2">
  <rect x="40" y="136" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="130" y="152" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">cat_cols</text>
  <text class="ts" x="130" y="168" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">num_but_cat · cat_but_car</text>
</g>
<g class="cls-box cls-box-3">
  <rect x="250" y="136" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="340" y="152" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">num_cols</text>
  <text class="ts" x="340" y="168" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">auto-classified on init</text>
</g>
<g class="cls-box cls-box-4">
  <rect x="460" y="136" width="180" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="550" y="152" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">num_summary_df</text>
  <text class="ts" x="550" y="168" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">set via num_summary()</text>
</g>

<!-- state connectors -->
<line class="cls-conn cls-conn-1" x1="340" y1="88" x2="130" y2="136" stroke="#ccc" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
<line class="cls-conn cls-conn-2" x1="340" y1="88" x2="340" y2="136" stroke="#ccc" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
<line class="cls-conn cls-conn-3" x1="340" y1="88" x2="550" y2="136" stroke="#ccc" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>

<!-- ── Section divider ── -->
<text class="ts" x="40" y="215" fill="#aaa">methods</text>
<line x1="90" y1="210" x2="640" y2="210" stroke="#ddd" stroke-width="0.5"/>

<!-- ── Row 1: Inspection ── -->
<g class="cls-box cls-box-5">
  <rect x="40" y="224" width="174" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="127" y="244" text-anchor="middle" dominant-baseline="central" fill="#04342C">check_dataframe()</text>
  <text class="ts" x="127" y="262" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">head · shape · NA · dupes</text>
</g>
<g class="cls-box cls-box-5">
  <rect x="230" y="224" width="174" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="317" y="244" text-anchor="middle" dominant-baseline="central" fill="#04342C">descriptive_analysis()</text>
  <text class="ts" x="317" y="262" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">CV% · skew · kurtosis</text>
</g>
<g class="cls-box cls-box-5">
  <rect x="420" y="224" width="220" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="530" y="244" text-anchor="middle" dominant-baseline="central" fill="#04342C">update_dataframe()</text>
  <text class="ts" x="530" y="262" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">re-runs column classify</text>
</g>

<!-- ── Row 2: Normality ── -->
<g class="cls-box cls-box-6">
  <rect x="40" y="310" width="174" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text class="th" x="127" y="330" text-anchor="middle" dominant-baseline="central" fill="#412402">check_num()</text>
  <text class="ts" x="127" y="348" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Q-Q · Shapiro / D'Agostino</text>
</g>
<g class="cls-box cls-box-7">
  <rect x="230" y="310" width="174" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text class="th" x="317" y="330" text-anchor="middle" dominant-baseline="central" fill="#412402">num_summary()</text>
  <text class="ts" x="317" y="348" text-anchor="middle" dominant-baseline="central" fill="#854F0B">sets num_summary_df</text>
</g>
<line class="cls-conn cls-conn-4" x1="214" y1="336" x2="230" y2="336" stroke="#BA7517" stroke-width="1.2" fill="none" marker-end="url(#arr-amber)"/>
<text class="ts" x="222" y="328" text-anchor="middle" fill="#BA7517">req</text>

<g class="cls-box cls-box-6">
  <rect x="420" y="316" width="220" height="40" rx="6" fill="none" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="ts" x="530" y="340" text-anchor="middle" dominant-baseline="central" fill="#854F0B">run these two before steps below</text>
</g>

<!-- ── Row 3: Outlier + Cat ── -->
<g class="cls-box cls-box-8">
  <rect x="40" y="400" width="174" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="127" y="420" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">check_outlier()</text>
  <text class="ts" x="127" y="438" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Z-score / IQR · cap / remove</text>
</g>
<g class="cls-box cls-box-8">
  <rect x="230" y="400" width="174" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="317" y="420" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">cat_summary()</text>
  <text class="ts" x="317" y="438" text-anchor="middle" dominant-baseline="central" fill="#993C1D">value counts · bar charts</text>
</g>

<!-- ── Row 4: Target + Correlation ── -->
<g class="cls-box cls-box-9">
  <rect x="40" y="490" width="174" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="127" y="510" text-anchor="middle" dominant-baseline="central" fill="#042C53">target_with_cat()</text>
  <text class="ts" x="127" y="528" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Chi-sq · Cramér's V</text>
</g>
<g class="cls-box cls-box-9">
  <rect x="230" y="490" width="174" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="317" y="510" text-anchor="middle" dominant-baseline="central" fill="#042C53">target_with_num()</text>
  <text class="ts" x="317" y="528" text-anchor="middle" dominant-baseline="central" fill="#185FA5">T-test / ANOVA / Spearman</text>
</g>
<g class="cls-box cls-box-10">
  <rect x="420" y="490" width="220" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="530" y="510" text-anchor="middle" dominant-baseline="central" fill="#042C53">correlation_heatmap()</text>
  <text class="ts" x="530" y="528" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Pearson · Spearman · Kendall</text>
</g>

<!-- vertical connectors -->
<line class="cls-conn cls-conn-5" x1="127" y1="180" x2="127" y2="224" stroke="#ccc" stroke-width="0.6" fill="none" marker-end="url(#arr)"/>
<line class="cls-conn cls-conn-6" x1="317" y1="180" x2="317" y2="224" stroke="#ccc" stroke-width="0.6" fill="none" marker-end="url(#arr)"/>
<line class="cls-conn cls-conn-7" x1="127" y1="276" x2="127" y2="310" stroke="#BA7517" stroke-width="0.6" fill="none" marker-end="url(#arr-amber)"/>
<line class="cls-conn cls-conn-8" x1="127" y1="362" x2="127" y2="400" stroke="#ccc" stroke-width="0.6" fill="none" marker-end="url(#arr)"/>
<line class="cls-conn cls-conn-9" x1="127" y1="452" x2="127" y2="490" stroke="#ccc" stroke-width="0.6" fill="none" marker-end="url(#arr)"/>

<!-- legend -->
<rect x="40" y="568" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="56" y="577" fill="#555">inspection</text>
<rect x="150" y="568" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="166" y="577" fill="#555">normality (required)</text>
<rect x="310" y="568" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="326" y="577" fill="#555">outlier / cat</text>
<rect x="430" y="568" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="446" y="577" fill="#555">target / correlation</text>

</svg>
